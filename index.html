      const cookieSprite = document.getElementById('cookie-sprite');
      const cookieWrapper = document.getElementById('cookie-wrapper');
      const fortuneText = document.getElementById('fortune-text');
      const revisitNotice = document.getElementById('revisit-notice');
      const shareBtn = document.getElementById('share-btn');
      const confettiLayer = document.getElementById('confetti');
      let isCracked = false;
      let currentFortune = '';

      const framePositions = ['0% 0%', '100% 0%', '0% 50%', '100% 50%', '0% 100%', '100% 100%'];
      const LAST_FRAME = 5; 
      const frameDelays = [80, 80, 150, 200, 300];

      function crackCookie() {
        if (isCracked) return;
        isCracked = true;

        cookieWrapper.classList.add('shake', 'opened');

        let currentFrame = 0;
        function nextFrame() {
          currentFrame++;
          if (currentFrame <= LAST_FRAME) {
            cookieSprite.style.backgroundPosition = framePositions[currentFrame];
            if (currentFrame === LAST_FRAME) burstConfetti();
            setTimeout(nextFrame, frameDelays[currentFrame - 1]);
          } else {
            cookieWrapper.classList.remove('shake');
            showFortune(false);
          }
        }
        setTimeout(nextFrame, frameDelays[0]);
      }

      function burstConfetti() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const emojis = ['🔥', '⭐', '🍄', '🌟', '✨', '🦋'];
        const rect = cookieSprite.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const count = 22;
        for (let i = 0; i < count; i++) {
          const piece = document.createElement('span');
          piece.className = 'confetti-piece';
          piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.45;
          const dist = 110 + Math.random() * 170;
          piece.style.left = cx + 'px';
          piece.style.top = cy + 'px';
          piece.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
          piece.style.setProperty('--dy', Math.sin(angle) * dist + 130 + 'px'); 
          piece.style.setProperty('--rot', Math.random() * 540 - 270 + 'deg');
          piece.style.fontSize = 16 + Math.random() * 16 + 'px';
          piece.style.animationDelay = Math.random() * 60 + 'ms';
          confettiLayer.appendChild(piece);
          piece.addEventListener('animationend', () => piece.remove());
        }
      }

      // 오늘의 (정식) 운세. 이미 오늘 뽑았으면 fresh:false 로 그대로 반환.
      function getTodayFortune() {
        const today = new Date().toDateString();
        if (localStorage.getItem('todayFortune_date') === today) {
          return { text: localStorage.getItem('todayFortune_text'), fresh: false };
        }
        const text = fortunes[Math.floor(Math.random() * fortunes.length)];
        localStorage.setItem('todayFortune_date', today);
        localStorage.setItem('todayFortune_text', text);
        return { text, fresh: true };
      }

      function pickRandomFortune(...exclude) {
        if (fortunes.length <= exclude.length + 1) {
          return fortunes.find((t) => !exclude.includes(t)) || fortunes[0];
        }
        let t;
        do {
          t = fortunes[Math.floor(Math.random() * fortunes.length)];
        } while (exclude.includes(t));
        return t;
      }


      function showFortune(isRevisit) {
        const { text, fresh } = getTodayFortune();
        currentFortune = text;

        fortuneText.innerText = currentFortune;
        fortuneText.classList.remove('hidden');
        void fortuneText.offsetWidth; 
        fortuneText.classList.add('show');

        if (!fresh) revisitNotice.classList.remove('hidden');

        shareBtn.classList.remove('hidden');

        fortuneText.scrollIntoView({ block: 'center' });
      }

      // 캔버스용 단어 단위 줄바꿈
      function wrapTextCanvas(ctx, text, maxW) {
        const words = String(text).split(' ');
        const lines = [];
        let line = '';
        for (const w of words) {
          const test = line ? line + ' ' + w : w;
          if (line && ctx.measureText(test).width > maxW) {
            lines.push(line);
            line = w;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        return lines.length ? lines : [''];
      }

      // 결과(운세)가 담긴 공유용 이미지를 만들어 PNG Blob으로 반환
      // — 화면처럼 "쿠키 이미지 + 가운데 운세" 부분만 담는다 (타이틀/푸터 없음)
      async function buildShareImage() {
        // 스프라이트 이미지 로드 (CSS의 background-image 경로 그대로 사용 → 이미 캐시됨)
        const srcMatch = /url\(["']?(.*?)["']?\)/.exec(getComputedStyle(cookieSprite).backgroundImage || '');
        const spriteUrl = srcMatch ? srcMatch[1] : 'cookie_sprite_.png';
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = spriteUrl;
        });

        // 캔버스 텍스트 측정/렌더 전에 폰트 로드 보장
        try {
          await Promise.all([document.fonts.load("600 28px 'Pretendard'"), document.fonts.ready]);
        } catch (e) {}

        // 스프라이트에서 "열린 쿠키"(= 마지막) 프레임 한 칸
        const cols = 2;
        const rows = 3;
        const [pxStr, pyStr] = framePositions[LAST_FRAME].split(' ');
        const col = Math.round((parseFloat(pxStr) / 100) * (cols - 1));
        const row = Math.round((parseFloat(pyStr) / 100) * (rows - 1));
        const cellW = img.naturalWidth / cols;
        const cellH = img.naturalHeight / rows;
        const cw = Math.round(cellW);
        const ch = Math.round(cellH);

        const canvas = document.createElement('canvas');
        canvas.width = cw;
        canvas.height = ch;
        const ctx = canvas.getContext('2d');

        // 배경(사이트와 동일) + 쿠키 프레임 1:1
        ctx.fillStyle = '#c1c6ca';
        ctx.fillRect(0, 0, cw, ch);
        ctx.drawImage(img, cellW * col, cellH * row, cellW, cellH, 0, 0, cw, ch);

        // 운세 텍스트 박스 (화면처럼 노란 배경 + 검정 글씨, 쿠키 가운데)
        ctx.textAlign = 'center';
        ctx.font = "600 28px 'Pretendard',sans-serif";
        const lines = wrapTextCanvas(ctx, currentFortune, 420);
        const lineH = 42;
        const padX = 16;
        const padY = 10;
        const textW = Math.max(...lines.map((l) => ctx.measureText(l).width));
        const boxW = textW + padX * 2;
        const boxH = lines.length * lineH + padY * 2;
        const boxX = (cw - boxW) / 2;
        const boxY = (ch - boxH) / 2;
        ctx.fillStyle = '#fdfe00';
        ctx.fillRect(boxX, boxY, boxW, boxH);
        ctx.fillStyle = '#111111';
        ctx.textBaseline = 'middle';
        lines.forEach((l, i) => ctx.fillText(l, cw / 2, boxY + padY + lineH * i + lineH / 2));

        return new Promise((resolve) => canvas.toBlob((b) => resolve(b), 'image/png'));
      }

      shareBtn.addEventListener('click', async () => {
        const shareText = `오늘의 직장인 하찮운세 🥠\n\n"${currentFortune}"`;
        const shareUrl = location.href;
        const title = '오늘의 직장인 하찮운세 🥠';

        const original = shareBtn.textContent;
        shareBtn.disabled = true;
        shareBtn.textContent = '이미지 만드는 중…';

        let file = null;
        try {
          const blob = await buildShareImage();
          if (blob) file = new File([blob], 'fortune-cookie.png', { type: 'image/png' });
        } catch (e) {
          // 이미지 생성 실패 시 텍스트 공유로 폴백
        }

        shareBtn.disabled = false;
        shareBtn.textContent = original;

        // 1) 이미지 파일 공유 (모바일 OS 공유 시트)
        if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title, text: shareText });
          } catch (err) {
            // 취소(AbortError) 등은 무시
          }
          return;
        }

        // 2) 파일 공유 불가 → 텍스트만 공유
        if (navigator.share) {
          try {
            await navigator.share({ title, text: shareText, url: shareUrl });
            return;
          } catch (err) {
            // 폴백 계속
          }
        }

        // 3) 데스크톱 폴백: 이미지 다운로드 + 텍스트 클립보드 복사
        if (file) {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(file);
          a.download = 'fortune-cookie.png';
          a.click();
          setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        }
        try {
          await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
          shareBtn.textContent = file ? '이미지 저장됨 📷' : '복사됨! 📋';
          setTimeout(() => {
            shareBtn.textContent = original;
          }, 1800);
        } catch (err) {
          if (!file) alert(`${shareText}\n${shareUrl}`);
        }
      });

      cookieWrapper.addEventListener('click', crackCookie);
      cookieWrapper.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          crackCookie();
        }
      });

      (function restoreIfViewedToday() {
        if (localStorage.getItem('todayFortune_date') !== new Date().toDateString()) return;
        isCracked = true;
        cookieWrapper.classList.add('opened');
        cookieSprite.style.backgroundPosition = framePositions[LAST_FRAME];
        showFortune(true);
      })();
    </script>
  </body>
</html>
